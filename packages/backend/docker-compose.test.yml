services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: star_test
      POSTGRES_PASSWORD: star_test_password
      POSTGRES_DB: star_astrology_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U star_test -d star_astrology_test']
      interval: 5s
      timeout: 3s
      retries: 5

  redis-test:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
